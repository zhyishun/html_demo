<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卡片详情</title>
<meta property="og:title" content="卡片详情" id="og-title">
<meta property="og:description" content="查看卡片详情" id="og-desc">
<meta property="og:image" content="https://fengxiang.zhyishun.top/demo.jpg" id="og-image">
<meta property="og:url" content="https://fengxiang.zhyishun.top/detail.html" id="og-url">
<meta property="og:type" content="website">

<script>
(function(){
  try{
    var BASE = 'https://fengxiang.zhyishun.top';
    document.getElementById('og-image').setAttribute('content', BASE + '/demo.jpg');
    document.getElementById('og-url').setAttribute('content', location.href);
    var h = location.hash.slice(1);
    if(!h) return;
    h = h.replace(/-/g,'+').replace(/_/g,'/');
    while(h.length%4) h += '=';
    var bin = atob(h), bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    var d = JSON.parse(new TextDecoder().decode(bytes));
    if(d.v===1 && d.t){
      document.title = d.t;
      document.getElementById('og-title').setAttribute('content', d.t);
      document.getElementById('og-desc').setAttribute('content', d.d||d.t);
      var imgUrl = d.i || (BASE + '/demo.jpg');
      if(imgUrl.indexOf('//') === -1) imgUrl = location.origin + '/' + imgUrl.replace(/^\//,'');
      document.getElementById('og-image').setAttribute('content', imgUrl);
      document.getElementById('og-url').setAttribute('content', location.href);
    }
  }catch(e){}
})();
</script>
<style>
:root{--green:#07C160;--green-d:#06AD56;--link:#576B95;--bg:#EDEDED;--card:#fff;--t1:#191919;--t2:#999;--t3:#B2B2B2;--border:#E5E5E5;--shadow:0 1px 6px rgba(0,0,0,.08);--radius:12px;--r:8px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--max:448px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100dvh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
.container{width:100%;max-width:var(--max);padding:20px 16px;padding-bottom:calc(env(safe-area-inset-bottom,16px)+40px)}
.header{text-align:center;margin-bottom:16px}
.header .icon{font-size:28px;margin-bottom:2px}
.header h1{font-size:17px;font-weight:600}
.card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.card-img{width:100%;height:200px;background:linear-gradient(135deg,#F0F0F0,#E8E8E8);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card-img img.hidden,.card-ph.hidden{display:none}
.card-ph{font-size:48px;opacity:.35;z-index:1}
.card-bd{padding:14px 16px 12px}
.card-bd .ct{font-size:17px;font-weight:500;line-height:1.4}
.card-bd .cd{font-size:14px;color:var(--t2);margin-top:6px;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px 20px;font-size:16px;font-weight:500;font-family:var(--font);border:none;border-radius:var(--r);cursor:pointer;outline:none;transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--green);color:#fff}
.btn-p:active{background:var(--green-d)}
.btn-o{background:var(--card);color:var(--green);border:1px solid var(--green)}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(153,153,153,.3);border-top-color:#999;border-radius:50%;animation:_spin .7s linear infinite;vertical-align:middle}
@keyframes _spin{to{transform:rotate(360deg)}}
.loc-box .lr{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;font-size:14px}
.loc-box .li{font-size:16px;flex-shrink:0;margin-top:1px}
.loc-box .la{color:var(--t1);line-height:1.5;word-break:break-all}
.loc-box .lc{color:var(--t2);font-size:13px}
.loc-box .ls{font-size:12px;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:4px}
.loc-box .lm{margin-top:10px;border-radius:8px;overflow:hidden;background:#F0F0F0}
.loc-box .lm img{width:100%;height:auto;display:block}
.loading{text-align:center;padding:24px;color:var(--t2)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) translateY(20px);background:rgba(0,0,0,.78);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;z-index:9999}
.toast.on{opacity:1;transform:translate(-50%,-50%) translateY(0)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;animation:_fadeIn .25s}
.modal-box{background:var(--card);border-radius:var(--radius);width:calc(100% - 48px);max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);animation:_slideUp .3s}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);font-size:16px;font-weight:600}
.modal-close{width:32px;height:32px;border:none;background:none;font-size:20px;color:var(--t2);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s}
.modal-close:hover{background:#F5F5F5}
.modal-bd{padding:20px}
@keyframes _fadeIn{from{opacity:0}to{opacity:1}}
@keyframes _slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.hidden{display:none !important}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon">📨</div>
    <h1 id="page-title">卡片详情</h1>
  </div>
  <div class="card">
    <div class="card-img"><img id="card-img" src="" alt="" class="hidden"><div class="card-ph" id="card-ph">🖼️</div></div>
    <div class="card-bd"><div class="ct" id="card-t"></div><div class="cd" id="card-d"></div></div>
  </div>
  <button class="btn btn-p" id="btn-loc" onclick="openLocModal()">📍 查看我的位置</button>
</div>

<div class="modal-overlay hidden" id="loc-modal">
  <div class="modal-box">
    <div class="modal-hd">
      <span>📍 我的位置</span>
      <button class="modal-close" onclick="closeLocModal()">&times;</button>
    </div>
    <div class="modal-bd">
      <div class="loading" id="modal-loading"><span class="spin"></span> 正在获取位置...</div>
      <div class="loc-box hidden" id="modal-result" style="box-shadow:none;margin-top:0;padding:0">
        <div class="lr"><span class="li">📍</span><span class="la" id="mla"></span></div>
        <div class="lr hidden" id="ml-row-road"><span class="li">🏠</span><span class="la" id="ml-road"></span></div>
        <div class="lr hidden" id="ml-row-district"><span class="li">🏘️</span><span class="la" id="ml-district"></span></div>
        <div class="lr hidden" id="ml-row-city"><span class="li">🏙️</span><span class="la" id="ml-city"></span></div>
        <div class="lr hidden" id="ml-row-province"><span class="li">🏛️</span><span class="la" id="ml-province"></span></div>
        <div class="lr hidden" id="ml-row-country"><span class="li">🌍</span><span class="la" id="ml-country"></span></div>
        <div class="lr hidden" id="ml-row-postcode"><span class="li">📮</span><span class="la" id="ml-postcode"></span></div>
        <div class="lr" style="margin-top:6px"><span class="li">🌐</span><span class="lc" id="mlc"></span></div>
        <span class="ls" id="mls"></span>
        <div class="lm" id="mlm"></div>
      </div>
      <div class="hidden" id="modal-error"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';
var $ = function(s){ return document.querySelector(s) };
var cardData = null;
var geoDone = false;
var AMAP_KEY = 'c6b4a865b7cd1c2d933e8699dd9f7768';

function setDetailRow(rid, eid, val){
  if(val){ $('#'+rid).classList.remove('hidden'); $('#'+eid).textContent = val; }
  else { $('#'+rid).classList.add('hidden'); }
}

// Toast
var _tt;
function toast(m, d){
  clearTimeout(_tt);
  var e = $('#toast'); e.textContent = m; e.classList.add('on');
  _tt = setTimeout(function(){ e.classList.remove('on'); }, d||2000);
}

function b64d(s){
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4) s += '=';
  var bin = atob(s), b = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) b[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(b);
}

function setImg(el, ph, src){
  if(!src){ el.classList.add('hidden'); ph.classList.remove('hidden'); el.removeAttribute('src'); return; }
  var done = false;
  el.onload = function(){ if(!done){ done=true; el.classList.remove('hidden'); ph.classList.add('hidden'); } };
  el.onerror = function(){ if(!done){ done=true; el.classList.add('hidden'); ph.classList.remove('hidden'); } };
  el.src = src;
}

function initCard(){
  var h = location.hash.slice(1);
  if(!h){ $('#page-title').textContent = '卡片详情'; return; }
  try{
    var d = JSON.parse(b64d(h));
    if(d.v===1 && d.t){
      cardData = d;
      $('#card-t').textContent = d.t||'';
      $('#card-d').textContent = d.d||'';
      setImg($('#card-img'), $('#card-ph'), d.i||'');
      document.title = d.t;
      $('#page-title').textContent = d.t;
    }
  }catch(e){ console.error('解析卡片数据失败:', e); }
}

// ==================== 弹窗 ====================
window.openLocModal = function(){
  $('#loc-modal').classList.remove('hidden');
  $('#modal-loading').classList.remove('hidden');
  $('#modal-result').classList.add('hidden');
  $('#modal-error').classList.add('hidden');
  geoDone = false;
  getLocation();
};

window.closeLocModal = function(){
  $('#loc-modal').classList.add('hidden');
};

document.addEventListener('click', function(e){
  if(e.target === $('#loc-modal')) closeLocModal();
});

// ==================== 定位 ====================
function getLocation(){
  if(!navigator.geolocation){
    showError('浏览器不支持GPS定位');
    return;
  }
  console.log('[getLocation] 请求 GPS...');
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      var acc = Math.round(pos.coords.accuracy);
      console.log('[getLocation] GPS 成功:', lat, lon, '±'+acc+'m');
      rgeo(lat, lon).then(function(addr){
        showResult(lat, lon, acc, addr);
      });
    },
    function(err){
      console.warn('[getLocation] GPS 失败:', err.message, err.code);
      if(err.code === 1) showError('请在浏览器设置中允许本页面访问位置信息，然后重试');
      else if(err.code === 2) showError('GPS信号弱，请到空旷处重试');
      else if(err.code === 3) showError('GPS请求超时，请重试');
      else showError(err.message);
    },
    { enableHighAccuracy:true, timeout:15000, maximumAge:30000 }
  );
}

function showError(msg){
  $('#modal-loading').classList.add('hidden');
  $('#modal-error').classList.remove('hidden');
  $('#modal-error').innerHTML = '<div style="text-align:center;padding:12px;color:#EE0A24">❌ ' + msg + '</div><button class="btn btn-o" onclick="getLocation()" style="margin-top:8px">🔄 重试</button>';
}

function showResult(lat, lon, acc, addr){
  geoDone = true;
  $('#modal-loading').classList.add('hidden');
  $('#modal-result').classList.remove('hidden');

  $('#mla').textContent = addr.display_name || (lat.toFixed(6)+', '+lon.toFixed(6));
  setDetailRow('ml-row-road', 'ml-road', addr.road);
  setDetailRow('ml-row-district', 'ml-district', addr.district);
  setDetailRow('ml-row-city', 'ml-city', addr.city);
  setDetailRow('ml-row-province', 'ml-province', addr.province);
  setDetailRow('ml-row-country', 'ml-country', addr.country);
  setDetailRow('ml-row-postcode', 'ml-postcode', addr.postcode);
  $('#mlc').textContent = lat.toFixed(6) + ', ' + lon.toFixed(6) + (acc ? ' (±'+acc+'m)' : '');
  $('#mls').textContent = '📡 GPS · 高精度';
  $('#mls').style.cssText = 'background:#E8F5E9;color:#2E7D32';
  var mu = 'https://staticmap.openstreetmap.de/staticmap.php?center='+lat+','+lon+'&zoom=15&size=400x200&markers='+lat+','+lon+',red-pushpin';
  $('#mlm').innerHTML = '<img src="'+mu+'" alt="地图" loading="lazy" onerror="this.parentElement.innerHTML=\'<div style=padding:40px;text-align:center;color:#999>地图不可用</div>\'">';
}

// ==================== 高德逆地理 (JSONP) ====================
var _gc={};
function rgeo(lat, lon){
  var k = lat.toFixed(4)+','+lon.toFixed(4);
  if(_gc[k]) return Promise.resolve(_gc[k]);

  return new Promise(function(resolve){
    var cb = '_amap_'+Date.now();
    var t = setTimeout(function(){ delete window[cb]; resolve(emptyAddr(lat,lon)); }, 8000);

    window[cb] = function(d){
      clearTimeout(t); delete window[cb];
      if(d.status!=='1'||!d.regeocode){ resolve(emptyAddr(lat,lon)); return; }

      console.log('[rgeo] 高德响应:', d);
      var ac = d.regeocode.addressComponent||{};
      var sn = ac.streetNumber||{};
      var nb = ac.neighborhood||{};
      var bd = ac.building||{};
      var fa = d.regeocode.formatted_address||'';

      var road = (sn.street||'') + ((sn.street&&sn.number)?' '+sn.number:(sn.number||''));
      if(!road&&bd.name) road = bd.name;
      var poi = nb.name||bd.name||'';
      if(poi&&road&&poi!==road&&road.indexOf(poi)===-1) road = poi+' '+road;

      var dist = ac.district||'';
      var town = ac.township||'';
      var df = dist + (town&&town!==dist?' · '+town:'');

      var parts = {
        display_name: fa,
        country: ac.country||'',
        province: ac.province||'',
        city: ac.city||'',
        district: df,
        road: road,
        postcode: ac.adcode||''
      };
      console.log('[rgeo] 解析:', parts);
      _gc[k] = parts;
      resolve(parts);
    };

    var s = document.createElement('script');
    s.src = 'https://restapi.amap.com/v3/geocode/regeo?key='+AMAP_KEY+'&location='+lon.toFixed(6)+','+lat.toFixed(6)+'&extensions=all&output=JSON&callback='+cb;
    s.onerror = function(){ clearTimeout(t); delete window[cb]; resolve(emptyAddr(lat,lon)); };
    document.head.appendChild(s);
  });
}

function emptyAddr(lat, lon){
  var ll = lat.toFixed(4)+', '+lon.toFixed(4);
  return { display_name:ll, country:'', province:'', city:'', district:'', road:'', postcode:'' };
}

initCard();
})();
</script>
</body>
</html>
