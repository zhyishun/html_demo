<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生成分享卡片</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .image-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f8f9fa;
            margin-top: 8px;
            position: relative;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        .image-preview .placeholder {
            color: #999;
            font-size: 14px;
            text-align: center;
        }
        
        .image-preview .placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 8px;
            opacity: 0.3;
        }
        
        .image-preview.has-image img {
            display: block;
        }
        
        .image-preview.has-image .placeholder {
            display: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            font-size: 14px;
            text-align: center;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s;
        }
        
        .status-bar.show {
            transform: translateY(0);
        }
        
        .status-bar.success {
            background: #52c41a;
            color: white;
        }
        
        .status-bar.error {
            background: #ff4d4f;
            color: white;
        }
        
        .status-bar.info {
            background: #1890ff;
            color: white;
        }
        
        .status-bar.warning {
            background: #faad14;
            color: white;
        }
        
        .guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            display: none;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 20px;
        }
        
        .guide-overlay.show {
            display: flex;
        }
        
        .guide-content {
            color: white;
            text-align: right;
            margin-top: 10px;
        }
        
        .guide-content svg {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .guide-content p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .guide-content .highlight {
            color: #ffd700;
            font-weight: bold;
        }
        
        .card-preview {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: none;
        }
        
        .card-preview.show {
            display: block;
        }
        
        .card-preview .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .card-preview .card-body {
            padding: 16px;
        }
        
        .card-preview .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .card-preview .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        
        .wechat-tips {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-size: 13px;
            color: #ad6800;
            line-height: 1.5;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .debug-info {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            color: #389e0d;
            display: none;
        }
        
        .debug-info.show {
            display: block;
        }
        
        .debug-info pre {
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 8px;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="status-bar" id="statusBar"></div>
    
    <div class="guide-overlay" id="guideOverlay" onclick="hideGuide()">
        <div class="guide-content">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="margin-bottom:10px">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34L2.1 2.1m17.8 17.8l-4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.24-4.24l-4.24 4.24M6.34 6.34l-4.24-4.24"></path>
            </svg>
            <p>点击右上角 <span class="highlight">···</span></p>
            <p>选择 <span class="highlight">"发送给朋友"</span> 或 <span class="highlight">"分享到朋友圈"</span></p>
            <p>即可生成分享卡片</p>
            <p style="font-size:12px;opacity:0.7;margin-top:10px;">点击任意处关闭提示</p>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎯 分享卡片生成器</h1>
            <p>填写信息，生成微信分享卡片</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label for="title">标题 *</label>
                <input type="text" id="title" placeholder="请输入分享标题" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="desc">描述 *</label>
                <textarea id="desc" placeholder="请输入分享描述" maxlength="100"></textarea>
            </div>
            
            <div class="form-group">
                <label for="imgUrl">图片链接 *</label>
                <input type="url" id="imgUrl" placeholder="https://example.com/image.jpg" oninput="previewImage()">
                <div class="image-preview" id="imagePreview">
                    <div class="placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <div>输入图片链接后预览</div>
                    </div>
                    <img id="previewImg" src="" alt="预览" onload="onImageLoad()" onerror="onImageError()">
                </div>
            </div>
            
            <button class="btn-primary" id="shareBtn" onclick="initShare()">
                生成分享卡片
            </button>
            
            <div class="wechat-tips">
                <strong>💡 使用说明：</strong><br>
                1. 填写标题、描述和图片链接<br>
                2. 点击「生成分享卡片」按钮<br>
                3. 点击右上角「···」分享给好友<br>
                4. 好友将看到精美的分享卡片
            </div>
            
            <div class="debug-info" id="debugInfo">
                <strong>调试信息：</strong>
                <pre id="debugContent"></pre>
            </div>
        </div>

        <div class="card-preview" id="cardPreview">
            <img class="card-image" id="cardImage" src="" alt="">
            <div class="card-body">
                <div class="card-title" id="cardTitle"></div>
                <div class="card-desc" id="cardDesc"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置区域 ====================
        const CONFIG = {
            // 后端签名接口地址
            signUrl: 'http://ms.gstai.com/phone/ajax_sign_vue.php',
            // 当前页面域名
            domain: 'https://fengxiang.zhyishun.top',
            // 点击卡片后的跳转地址
            jumpUrl: 'https://fengxiang.zhyishun.top/detail.html',
            // 是否开启调试模式（会alert微信返回的信息）
            debug: false
        };

        // ==================== 全局状态 ====================
        let wxReady = false;
        let wxConfigData = null;
        let shareData = {
            title: '',
            desc: '',
            imgUrl: '',
            link: CONFIG.jumpUrl
        };

        // ==================== 工具函数 ====================
        
        // 显示状态提示
        function showStatus(message, type = 'info', duration = 3000) {
            const bar = document.getElementById('statusBar');
            bar.textContent = message;
            bar.className = 'status-bar ' + type + ' show';
            
            if (duration > 0) {
                setTimeout(() => {
                    bar.classList.remove('show');
                }, duration);
            }
        }

        // 显示调试信息
        function showDebug(info) {
            const debugEl = document.getElementById('debugInfo');
            const contentEl = document.getElementById('debugContent');
            contentEl.textContent = typeof info === 'string' ? info : JSON.stringify(info, null, 2);
            debugEl.classList.add('show');
        }

        // 获取当前页面完整URL（不含#部分）
        function getCurrentUrl() {
            return window.location.href.split('#')[0];
        }

        // 获取URL参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                title: params.get('title') || '',
                desc: params.get('desc') || '',
                imgUrl: params.get('imgUrl') || ''
            };
        }

        // 检测是否在微信内
        function isWechat() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }

        // ==================== 图片预览 ====================
        
        function previewImage() {
            const url = document.getElementById('imgUrl').value.trim();
            const preview = document.getElementById('imagePreview');
            const img = document.getElementById('previewImg');
            
            if (url) {
                img.src = url;
            } else {
                preview.classList.remove('has-image');
            }
        }

        function onImageLoad() {
            document.getElementById('imagePreview').classList.add('has-image');
        }

        function onImageError() {
            document.getElementById('imagePreview').classList.remove('has-image');
            if (document.getElementById('imgUrl').value.trim()) {
                showStatus('图片加载失败，请检查链接', 'error');
            }
        }

        // ==================== 微信签名获取 ====================

        /**
         * 方案1：使用 fetch + no-cors 模式（可能无法读取响应体，但会发送请求）
         * 方案2：使用 XMLHttpRequest 同步请求
         * 方案3：使用图片预加载方式（GET请求）
         * 方案4：使用 iframe + postMessage
         * 
         * 由于接口不支持 CORS，我们尝试多种方式
         */

        // 方式1：尝试 fetch 请求
        async function tryFetchSignature() {
            const currentUrl = getCurrentUrl();
            const requestUrl = CONFIG.signUrl + '?url=' + encodeURIComponent(currentUrl);
            
            try {
                const response = await fetch(requestUrl, {
                    method: 'GET',
                    // 尝试不带 cors 模式
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const data = await response.json();
                return { success: true, data: data };
                
            } catch (error) {
                console.log('fetch 方式失败:', error.message);
                return { success: false, error: error.message };
            }
        }

        // 方式2：使用 XMLHttpRequest
        function tryXhrSignature() {
            return new Promise((resolve) => {
                const currentUrl = getCurrentUrl();
                const requestUrl = CONFIG.signUrl + '?url=' + encodeURIComponent(currentUrl);
                
                const xhr = new XMLHttpRequest();
                xhr.timeout = 10000;
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                const data = JSON.parse(xhr.responseText);
                                resolve({ success: true, data: data });
                            } catch (e) {
                                resolve({ success: false, error: '解析JSON失败: ' + e.message, response: xhr.responseText });
                            }
                        } else {
                            resolve({ success: false, error: 'HTTP ' + xhr.status, response: xhr.responseText });
                        }
                    }
                };
                
                xhr.onerror = function() {
                    resolve({ success: false, error: '网络请求失败（跨域或被拦截）' });
                };
                
                xhr.ontimeout = function() {
                    resolve({ success: false, error: '请求超时' });
                };
                
                xhr.open('GET', requestUrl, true);
                xhr.setRequestHeader('Accept', 'application/json');
                xhr.send();
            });
        }

        // 方式3：使用 JSONP（如果接口支持 callback 参数）
        function tryJsonpSignature() {
            return new Promise((resolve, reject) => {
                const currentUrl = getCurrentUrl();
                const callbackName = 'wxSignCallback_' + Date.now();
                
                // 清理函数
                const cleanup = () => {
                    delete window[callbackName];
                    const script = document.getElementById('jsonp-script');
                    if (script) script.remove();
                };
                
                // 超时处理
                const timeoutId = setTimeout(() => {
                    cleanup();
                    resolve({ success: false, error: 'JSONP 请求超时' });
                }, 10000);
                
                // 回调函数
                window[callbackName] = function(data) {
                    clearTimeout(timeoutId);
                    cleanup();
                    resolve({ success: true, data: data });
                };
                
                // 创建 script 标签
                const script = document.createElement('script');
                script.id = 'jsonp-script';
                script.onerror = function() {
                    clearTimeout(timeoutId);
                    cleanup();
                    resolve({ success: false, error: 'JSONP 加载失败（接口可能不支持callback参数）' });
                };
                
                const requestUrl = CONFIG.signUrl + 
                    '?url=' + encodeURIComponent(currentUrl) + 
                    '&callback=' + callbackName;
                
                script.src = requestUrl;
                document.head.appendChild(script);
            });
        }

        // 方式4：使用图片预加载方式发送 GET 请求（只能发送，无法接收响应）
        // 这种方式无法获取响应，仅作为备选

        // 综合获取签名：依次尝试多种方式
        async function getWxSignature() {
            const results = [];
            
            // 尝试1：fetch
            showStatus('正在尝试获取签名...', 'info', 0);
            const fetchResult = await tryFetchSignature();
            results.push({ method: 'fetch', ...fetchResult });
            if (fetchResult.success) return fetchResult.data;
            
            // 尝试2：XMLHttpRequest
            showStatus('尝试备用方式获取签名...', 'info', 0);
            const xhrResult = await tryXhrSignature();
            results.push({ method: 'xhr', ...xhrResult });
            if (xhrResult.success) return xhrResult.data;
            
            // 尝试3：JSONP
            showStatus('尝试 JSONP 方式...', 'info', 0);
            const jsonpResult = await tryJsonpSignature();
            results.push({ method: 'jsonp', ...jsonpResult });
            if (jsonpResult.success) return jsonpResult.data;
            
            // 所有方式都失败了
            const errorInfo = '所有请求方式均失败:\n' + results.map(r => 
                `[${r.method}] ${r.success ? '成功' : '失败'}: ${r.error || ''}`
            ).join('\n');
            
            throw new Error(errorInfo);
        }

        // ==================== 微信配置 ====================

        // 解析签名数据（处理不同的返回格式）
        function parseSignData(rawData) {
            console.log('原始签名数据:', rawData);
            
            // 格式1: {signPackage: {appId, timestamp, nonceStr, signature, ...}}
            if (rawData.signPackage) {
                return {
                    appId: rawData.signPackage.appId,
                    timestamp: rawData.signPackage.timestamp,
                    nonceStr: rawData.signPackage.nonceStr,
                    signature: rawData.signPackage.signature
                };
            }
            
            // 格式2: {appId, timestamp, nonceStr, signature}
            if (rawData.signature && rawData.timestamp) {
                return {
                    appId: rawData.appId || rawData.appid,
                    timestamp: rawData.timestamp,
                    nonceStr: rawData.nonceStr || rawData.noncestr,
                    signature: rawData.signature
                };
            }
            
            // 格式3: {data: {appId, timestamp, nonceStr, signature}}
            if (rawData.data && rawData.data.signature) {
                return parseSignData(rawData.data);
            }
            
            throw new Error('无法识别的签名数据格式: ' + JSON.stringify(rawData));
        }

        // 配置微信JS-SDK
        async function configWx() {
            try {
                const rawData = await getWxSignature();
                const signData = parseSignData(rawData);
                
                console.log('解析后的签名数据:', signData);
                
                if (!signData.appId || !signData.signature) {
                    throw new Error('签名数据不完整');
                }
                
                // 保存配置数据
                wxConfigData = signData;
                
                return new Promise((resolve, reject) => {
                    wx.config({
                        debug: CONFIG.debug,
                        appId: signData.appId,
                        timestamp: signData.timestamp,
                        nonceStr: signData.nonceStr,
                        signature: signData.signature,
                        jsApiList: [
                            'updateAppMessageShareData',
                            'updateTimelineShareData',
                            'onMenuShareAppMessage',
                            'onMenuShareTimeline',
                            'onMenuShareQQ',
                            'onMenuShareQZone'
                        ]
                    });
                    
                    wx.ready(() => {
                        wxReady = true;
                        showStatus('微信配置成功！', 'success');
                        resolve();
                    });
                    
                    wx.error((err) => {
                        console.error('wx.config 错误:', err);
                        const errorMsg = typeof err === 'object' ? JSON.stringify(err) : err;
                        showStatus('微信配置失败: ' + errorMsg, 'error');
                        reject(new Error('wx.config failed: ' + errorMsg));
                    });
                });
                
            } catch (error) {
                console.error('配置失败:', error);
                showStatus('配置失败: ' + error.message, 'error', 5000);
                showDebug(error.message);
                throw error;
            }
        }

        // ==================== 分享功能 ====================

        // 验证并收集分享数据
        function collectShareData() {
            const title = document.getElementById('title').value.trim();
            const desc = document.getElementById('desc').value.trim();
            const imgUrl = document.getElementById('imgUrl').value.trim();
            
            if (!title) {
                showStatus('请填写标题', 'error');
                return false;
            }
            if (!desc) {
                showStatus('请填写描述', 'error');
                return false;
            }
            if (!imgUrl) {
                showStatus('请填写图片链接', 'error');
                return false;
            }
            
            shareData = {
                title: title,
                desc: desc,
                imgUrl: imgUrl,
                link: CONFIG.jumpUrl
            };
            
            // 更新预览
            document.getElementById('cardImage').src = imgUrl;
            document.getElementById('cardTitle').textContent = title;
            document.getElementById('cardDesc').textContent = desc;
            document.getElementById('cardPreview').classList.add('show');
            
            return true;
        }

        // 注册分享事件
        function registerShare() {
            // 新版 API（1.4.0+）
            wx.updateAppMessageShareData({
                title: shareData.title,
                desc: shareData.desc,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    console.log('updateAppMessageShareData 成功');
                },
                fail: function(err) {
                    console.error('updateAppMessageShareData 失败:', err);
                }
            });
            
            wx.updateTimelineShareData({
                title: shareData.title,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    console.log('updateTimelineShareData 成功');
                },
                fail: function(err) {
                    console.error('updateTimelineShareData 失败:', err);
                }
            });
            
            // 兼容旧版 API
            wx.onMenuShareAppMessage({
                title: shareData.title,
                desc: shareData.desc,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    showStatus('分享成功！', 'success');
                    hideGuide();
                },
                cancel: function() {
                    showStatus('已取消分享', 'info');
                },
                fail: function(err) {
                    console.error('onMenuShareAppMessage 失败:', err);
                }
            });
            
            wx.onMenuShareTimeline({
                title: shareData.title,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    showStatus('分享成功！', 'success');
                    hideGuide();
                },
                cancel: function() {
                    showStatus('已取消分享', 'info');
                },
                fail: function(err) {
                    console.error('onMenuShareTimeline 失败:', err);
                }
            });
            
            console.log('分享数据已注册:', shareData);
        }

        // ==================== 主流程 ====================

        async function initShare() {
            if (!collectShareData()) return;
            
            const btn = document.getElementById('shareBtn');
            btn.innerHTML = '<span class="loading"></span> 配置中...';
            btn.disabled = true;
            
            try {
                // 如果已经配置过且成功，直接注册分享
                if (wxReady && wxConfigData) {
                    registerShare();
                    showGuide();
                    return;
                }
                
                // 不在微信内，给出提示
                if (!isWechat()) {
                    showStatus('请在微信中打开此页面', 'warning', 5000);
                    showGuide(); // 仍然显示引导，让用户知道操作方式
                    return;
                }
                
                // 配置微信
                await configWx();
                registerShare();
                showGuide();
                
            } catch (error) {
                console.error('初始化分享失败:', error);
            } finally {
                btn.innerHTML = '生成分享卡片';
                btn.disabled = false;
            }
        }

        function showGuide() {
            document.getElementById('guideOverlay').classList.add('show');
        }

        function hideGuide() {
            document.getElementById('guideOverlay').classList.remove('show');
        }

        // ==================== 页面初始化 ====================

        function initPage() {
            const params = getUrlParams();
            if (params.title) document.getElementById('title').value = decodeURIComponent(params.title);
            if (params.desc) document.getElementById('desc').value = decodeURIComponent(params.desc);
            if (params.imgUrl) {
                document.getElementById('imgUrl').value = decodeURIComponent(params.imgUrl);
                previewImage();
            }
            
            // 自动填充测试数据（开发时方便测试）
            if (!params.title && location.hostname === 'localhost') {
                document.getElementById('title').value = '测试标题';
                document.getElementById('desc').value = '这是一个测试描述';
                document.getElementById('imgUrl').value = 'https://picsum.photos/400/300';
                previewImage();
            }
        }

        // 监听输入变化
        ['title', 'desc', 'imgUrl'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (document.getElementById('title').value && 
                    document.getElementById('desc').value && 
                    document.getElementById('imgUrl').value) {
                    collectShareData();
                }
            });
        });

        // 页面加载完成
        window.addEventListener('load', function() {
            initPage();
            
            if (!isWechat()) {
                showStatus('请在微信中打开以获得完整功能', 'warning', 5000);
            }
            
            console.log('当前页面URL:', getCurrentUrl());
            console.log('是否微信环境:', isWechat());
        });
    </script>
</body>
</html>
