<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小卡片分享</title>
<meta property="og:title" content="小卡片分享" id="og-title">
<meta property="og:description" content="有人给你分享了一张卡片" id="og-desc">
<meta property="og:image" content="https://fengxiang.zhyishun.top/demo.jpg" id="og-image">
<!-- ★ og:url 初始值，同步脚本会用 location.href 覆盖 -->
<meta property="og:url" content="https://fengxiang.zhyishun.top/" id="og-url">
<meta property="og:type" content="website">

<!-- ★ 同步脚本：浏览器「转发/分享」读 OG 标签前，先把 hash 里的卡片数据填进去 -->
<script>
(function(){
  try{
    var BASE = 'https://fengxiang.zhyishun.top';
    var PAGE_URL = location.href; 

    var h = location.hash.slice(1);
    if(!h){
      document.getElementById('og-title').setAttribute('content', '小卡片分享');
      document.getElementById('og-desc').setAttribute('content', '有人给你分享了一张卡片');
      document.getElementById('og-image').setAttribute('content', BASE + '/demo.jpg');
      document.getElementById('og-url').setAttribute('content', PAGE_URL);
      return;
    }
    h = h.replace(/-/g,'+').replace(/_/g,'/');
    while(h.length%4) h += '=';
    var bin = atob(h), bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    var d = JSON.parse(new TextDecoder().decode(bytes));
    if(d.v===1 && d.t){
      document.title = d.t;
      document.getElementById('og-title').setAttribute('content', d.t);
      document.getElementById('og-desc').setAttribute('content', d.d||d.t);
      var imgUrl = d.i || (BASE + '/demo.jpg');
      if(imgUrl.indexOf('//') === -1) imgUrl = location.origin + '/' + imgUrl.replace(/^\//,'');
      document.getElementById('og-image').setAttribute('content', imgUrl);
      document.getElementById('og-url').setAttribute('content', PAGE_URL);
    }
  }catch(e){}
})();
</script>
<style>
:root{--green:#07C160;--green-d:#06AD56;--link:#576B95;--bg:#EDEDED;--card:#fff;--t1:#191919;--t2:#999;--t3:#B2B2B2;--border:#E5E5E5;--shadow:0 1px 6px rgba(0,0,0,.08);--radius:12px;--r:8px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--max:448px;--theme:#07C160;--theme-d:#06AD56}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100dvh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
body[data-theme="green"]{--theme:#07C160;--theme-d:#06AD56}
body[data-theme="blue"]{--theme:#1989FA;--theme-d:#1676D4}
body[data-theme="orange"]{--theme:#FF976A;--theme-d:#E87D52}
body[data-theme="red"]{--theme:#EE0A24;--theme-d:#D40820}
.container{width:100%;max-width:var(--max);padding:20px 16px;padding-bottom:calc(env(safe-area-inset-bottom,16px)+20px)}
.header{text-align:center;margin-bottom:20px}
.header .icon{font-size:32px;margin-bottom:4px}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:13px;color:var(--t3);margin-top:2px}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .35s ease}
.wx-banner{background:#E8F5E9;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;text-align:center}
.wx-banner .wx-ok{font-size:15px;font-weight:600;color:#2E7D32}
.wx-banner .wx-h{font-size:12px;color:#666;margin-top:4px}
.not-wx{background:#FFF3E0;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;text-align:center;font-size:14px;color:#E65100}
.share-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:9998;display:flex;align-items:flex-start;justify-content:flex-end}
.share-pop{text-align:right;color:#fff;margin:12px 20px 0 0}
.share-arrow{font-size:48px;line-height:1}

.fg{margin-bottom:16px}

.fg input,.fg textarea{width:100%;padding:10px 14px;font-size:15px;font-family:var(--font);border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--t1);outline:none;transition:border-color .2s}

.card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin:16px 0}

.card-bd{padding:14px 16px 12px}

.card-ft{border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.card-ft .cf-t{font-size:13px;color:var(--link)}
.card-ft .cf-a{color:#C7C7CC;font-size:14px}
.tap-hint{text-align:center;font-size:12px;color:var(--t3);margin-top:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px 20px;font-size:16px;font-weight:500;font-family:var(--font);border:none;border-radius:var(--r);cursor:pointer;outline:none;transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--theme);color:#fff}.btn-p:hover{background:var(--theme-d)}
.btn-o{background:var(--card);color:var(--theme);border:1px solid var(--theme)}
.btns{display:flex;gap:10px;margin-top:8px}.btns .btn{flex:1}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(153,153,153,.3);border-top-color:#999;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loc-res{background:#fff;border-radius:var(--radius);padding:16px;margin-top:16px;box-shadow:var(--shadow);text-align:left}
.loc-res .lh{font-size:15px;font-weight:600;margin-bottom:10px}
.loc-res .lr{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:14px}
.loc-res .li{font-size:16px;flex-shrink:0;margin-top:1px}
.loc-res .la{color:var(--t1);line-height:1.5}
.loc-res .lc{color:var(--t2);font-size:13px}
.loc-res .ls{font-size:12px;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:4px}
.loc-res .lm{margin-top:10px;border-radius:8px;overflow:hidden;background:#F0F0F0}
.loc-res .lm img{width:100%;height:auto;display:block}
.loading{text-align:center;padding:20px;color:var(--t2)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) translateY(20px);background:rgba(0,0,0,.78);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;z-index:9999}
.toast.on{opacity:1;transform:translate(-50%,-50%) translateY(0)}
.hidden{display:none !important}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:720px){.container{max-width:720px}.erow{display:flex;gap:24px;align-items:flex-start}.erow .ef{flex:1}.erow .ep{flex:1;position:sticky;top:20px}.plabel{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:8px;display:block!important}}
@media(max-width:719px){.plabel{display:none!important}}
</style>
</head>

<div class="container">

<!-- ★★★ WeChat JSSDK ★★★ -->
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>

<!-- ★★★ 统一分享数据（全局唯一数据源） ★★★ -->
<script>
window._SD = {
  title: '小卡片分享',
  desc:  '有人给你分享了一张卡片',
  link:  location.href, 
  imgUrl:'https://fengxiang.zhyishun.top/demo.jpg'
};
</script>

<script>
(function(){
'use strict';

var $ = function(s){ return document.querySelector(s) };
var $$ = function(s){ return document.querySelectorAll(s) };
var B = document.body;
var isWX = /MicroMessenger/i.test(navigator.userAgent);
var App = { cardData: null, geoDone: false };

// ★ 新增：标记 JSSDK 是否已经 ready
var wxReady = false;

// ========== Toast ==========
var _tt;
function toast(m, d){ clearTimeout(_tt); var e = $('#toast'); e.textContent = m; e.classList.add('on'); _tt = setTimeout(function(){ e.classList.remove('on') }, d || 2000); }

// ========== Panel ==========
function show(p){ $$('.panel').forEach(function(e){ e.classList.remove('active') }); p.classList.add('active'); }

// ========== Base64 ==========
function b64e(s){ var b = new TextEncoder().encode(s), r = ''; b.forEach(function(v){ r += String.fromCharCode(v) }); return btoa(r).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64d(s){ s = s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length % 4) s += '='; var bin = atob(s), b = new Uint8Array(bin.length); for(var i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i); return new TextDecoder().decode(b); }
function enc(d){ return b64e(JSON.stringify(d)); }
function dec(h){ try{ if(!h) return null; var d = JSON.parse(b64d(h)); return (d.v === 1 && d.t && d.t.trim()) ? d : null; } catch(e){ return null; } }

// ========== 图片 ==========
function setImg(el, ph, src){
  if(!src){ el.classList.add('hidden'); ph.classList.remove('hidden'); el.removeAttribute('src'); return; }
  var done = false;
  el.onload = function(){ if(!done){ done = true; el.classList.remove('hidden'); ph.classList.add('hidden'); } };
  el.onerror = function(){ if(!done){ done = true; el.classList.add('hidden'); ph.classList.remove('hidden'); } };
  el.src = src;
  if(el.complete) setTimeout(function(){ if(!done && el.naturalWidth > 0){ done = true; el.classList.remove('hidden'); ph.classList.add('hidden'); } }, 50);
}

// ========== OG 标签 ==========
function updateOG(title, desc, img){
  document.title = title || document.title;
  $('#og-title').setAttribute('content', title || '');
  $('#og-desc').setAttribute('content', desc || '');
  if(img && img.indexOf('//') === -1) img = location.origin + '/' + img.replace(/^\//,'');
  if(!img) img = 'https://fengxiang.zhyishun.top/demo.jpg';
  $('#og-image').setAttribute('content', img);
  $('#og-url').setAttribute('content', location.href);
  if(img){ (new Image()).src = img; }
}

// ========== 应用微信分享配置（核心修复） ==========
function applyShareConfig() {
  if (!window.wx || !wxReady) return; // 如果还没 ready，则不执行
  var s = window._SD;
  
  // ★ 使用最新的官方接口名
  wx.updateAppMessageShareConfig({
    title: s.title, 
    desc: s.desc, 
    link: s.link,
    imgUrl: s.imgUrl,
    success: function () {
      console.log('[WX] 分享给朋友 配置成功');
    }
  });

  wx.updateTimelineShareConfig({
    title: s.title, 
    link: s.link, 
    imgUrl: s.imgUrl,
    success: function () {
      console.log('[WX] 分享到朋友圈 配置成功');
    }
  });
}

// ========== 更新分享数据 ==========
function updateShareData(title, desc, imgUrl){
  if(imgUrl && imgUrl.indexOf('//') === -1) imgUrl = location.origin + '/' + imgUrl.replace(/^\//,'');
  if(!imgUrl) imgUrl = 'https://fengxiang.zhyishun.top/demo.jpg';

  // 更新全局唯一数据源
  _SD.title  = title  || '小卡片分享';
  _SD.desc   = desc   || title || '有人给你分享了一张卡片';
  _SD.link   = location.href; 
  _SD.imgUrl = imgUrl;

  // 同步 OG 标签 (仅对 PC 端有效)
  updateOG(title, desc, imgUrl);

  // ★ 如果 JSSDK 已经 ready，立即触发更新
  applyShareConfig();
  
  console.log('[SD] 分享数据已更新: title=' + _SD.title);
}

// ========== JSSDK 初始化 ==========
function initJSSDK(){
  if(!isWX) return;

  // 签名 URL 必须去掉 # 及后面的部分
  var pageUrl = location.href.split('#')[0]; 
  
  // 注意：这里请求你后端的签名接口，请确保后端返回正确的 signature
  fetch('http://ms.gstai.com/phone/ajax_sign_vue.php?url=' + encodeURIComponent(pageUrl))
    .then(function(res){ return res.json(); })
    .then(function(data){
      var p = data.signPackage || data;
      if(!p.signature){ 
        console.error('[WX] 签名获取失败:', JSON.stringify(data)); 
        return; 
      }

      wx.config({
        debug: false, // 调试时可改为 true，看微信弹窗报错
        appId: p.appId,
        timestamp: parseInt(p.timestamp),
        nonceStr: p.nonceStr,
        signature: p.signature,
        jsApiList: [
          'updateAppMessageShareConfig', // ★ 修正为最新接口名
          'updateTimelineShareConfig'    // ★ 修正为最新接口名
        ]
      });

      wx.ready(function(){
        wxReady = true; // 标记为 ready
        console.log('[WX] JSSDK ready, 开始配置分享卡片');
        applyShareConfig(); // 初始化时应用一次分享配置
      });

      wx.error(function(res){
        console.error('[WX] config 配置失败：', res);
      });
    })
    .catch(function(e){
      console.error('[WX] 签名接口请求失败:', e.message);
    });
}

// ========== Mode Switch ==========
function go(mode, data){
  if(data){
    App.cardData = data;
    updateShareData(data.t, data.d || data.t, data.i || '');
  }
  B.setAttribute('data-theme', (data && data.th) || 'green');
  B.setAttribute('data-mode', mode);

  if(mode === 'editor'){ show($('#p-editor')); location.hash = ''; renderEditor(); }
  else{ show($('#p-viewer')); renderViewer(); }
}

// ========== UI ==========
function updateUI(){
  if(isWX){ $('#wx-banner').classList.remove('hidden'); $('#not-wx').classList.add('hidden'); }
  else{ $('#wx-banner').classList.add('hidden'); $('#not-wx').classList.remove('hidden'); }
}

// ========== Editor ==========
function renderEditor(){
  updateUI(); $('#share-overlay').classList.add('hidden');
  var d = App.cardData || { t:'', d:'', i:'', th:'green' };
  $('#tit').value = d.t || ''; $('#desc').value = d.d || ''; $('#img').value = d.i || '';
  upCnt(); pTheme(d.th || 'green'); preview();
}
function pTheme(th){ $$('.dot').forEach(function(b){ b.classList.toggle('on', b.dataset.t === th) }); B.setAttribute('data-theme', th); }
function upCnt(){ $('#tn').textContent = $('#tit').value.length; $('#dn').textContent = $('#desc').value.length; }
function preview(){ $('#pv-t').textContent = $('#tit').value.trim() || '卡片标题'; $('#pv-d').textContent = $('#desc').value.trim() || '卡片描述...'; setImg($('#pv-img'), $('#pv-ph'), $('#img').value.trim()); }

$('#form').addEventListener('submit', function(e){
  e.preventDefault();
  var d = { v:1, t:$('#tit').value.trim(), d:$('#desc').value.trim(), i:$('#img').value.trim(), th:B.getAttribute('data-theme')||'green' };
  if(!d.t){ toast('⚠️ 请输入卡片标题'); $('#tit').focus(); return; }
  App.cardData = d;
  var hash = enc(d);
  history.replaceState(null, '', location.origin + location.pathname + '#' + hash);

  // ★ 更新分享数据（会自动调用 applyShareConfig 更新微信卡片）
  updateShareData(d.t, d.d || d.t, d.i || '');

  if(isWX){
    $('#share-overlay').classList.remove('hidden');
    $('#subtitle').textContent = '点击右上角 ··· → 发送给朋友 / 朋友圈';
    toast('👆 点击右上角 ··· 分享');
  }else{
    copyUrl(location.href).then(function(){ toast('✅ 已复制！发微信打开后点右上角分享'); }).catch(function(){ toast('⚠️ 复制失败'); });
    $('#subtitle').textContent = '链接已复制，发微信打开后点右上角分享';
  }
});

var _deb;
$('#tit').addEventListener('input', function(){ upCnt(); clearTimeout(_deb); _deb = setTimeout(preview, 200); });
$('#desc').addEventListener('input', function(){ upCnt(); clearTimeout(_deb); _deb = setTimeout(preview, 200); });
$('#img').addEventListener('input', function(){ clearTimeout(_deb); _deb = setTimeout(preview, 200); });
$('#dots').addEventListener('click', function(e){ var b = e.target.closest('.dot'); if(!b) return; pTheme(b.dataset.t); preview(); });
$('#share-overlay').addEventListener('click', function(){ this.classList.add('hidden'); });
$('#btn-copy-link').addEventListener('click', function(){ copyUrl(location.href).then(function(){ toast('✅ 已复制'); }); });

function copyUrl(url){
  if(navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(url);
  return new Promise(function(resolve, reject){
    var ta = document.createElement('textarea'); ta.value = url; ta.style.cssText = 'position:fixed;left:-9999px;';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); resolve(); } catch(e){ reject(e); }
    document.body.removeChild(ta);
  });
}

// ========== Viewer ==========
function renderViewer(){
  var d = App.cardData; if(!d){ go('editor'); return; }
  $('#vw-t').textContent = d.t || ''; $('#vw-d').textContent = d.d || '';
  setImg($('#vw-img'), $('#vw-ph'), d.i || '');
  $('#tap-hint').classList.remove('hidden');
  $('#vw-ft').textContent = '点击卡片 · 查看详情并共享位置';
}

// ========== Boot ==========
$('#btn-make').addEventListener('click', function(){ App.cardData = null; go('editor'); });
window.addEventListener('hashchange', function(){ var d = dec(location.hash.slice(1)); go(d ? 'viewer' : 'editor', d || undefined); });

function boot(){
  updateUI();
  initJSSDK();
  var d = dec(location.hash.slice(1));
  go(d ? 'viewer' : 'editor', d || undefined);
}
document.addEventListener('DOMContentLoaded', boot);

})();
