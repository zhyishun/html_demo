<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小卡片分享</title>
<style>
:root {
  --green: #07C160; --green-d: #06AD56; --link: #576B95; --bg: #EDEDED;
  --card-bg: #fff; --t1: #191919; --t2: #999; --t3: #B2B2B2; --border: #E5E5E5;
  --shadow: 0 1px 6px rgba(0,0,0,0.08); --radius: 12px; --r-btn: 8px;
  --font: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --max-w: 448px; --theme: #07C160; --theme-d: #06AD56;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);background:var(--bg);color:var(--t1);
  min-height:100dvh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;
}
body[data-theme="green"] {--theme:#07C160;--theme-d:#06AD56}
body[data-theme="blue"]  {--theme:#1989FA;--theme-d:#1676D4}
body[data-theme="orange"]{--theme:#FF976A;--theme-d:#E87D52}
body[data-theme="red"]   {--theme:#EE0A24;--theme-d:#D40820}

.container{width:100%;max-width:var(--max-w);padding:20px 16px;padding-bottom:calc(env(safe-area-inset-bottom, 16px) + 20px)}
.header{text-align:center;margin-bottom:20px}
.header .icon{font-size:32px;margin-bottom:4px}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:13px;color:var(--t3);margin-top:2px}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .35s ease}

/* ===== In-WeChat Banner ===== */
.wx-banner{background:#E8F5E9;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;text-align:center}
.wx-banner .wx-check{font-size:15px;font-weight:600;color:#2E7D32}
.wx-banner .wx-hint{font-size:12px;color:#666;margin-top:4px}

.not-wx-banner{background:#FFF3E0;border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;text-align:center}
.not-wx-banner p{font-size:14px;color:#E65100;margin-bottom:8px}
.not-wx-banner code{display:block;background:#263238;color:#A5D6A7;padding:10px 14px;border-radius:6px;margin:8px 0;font-size:13px;word-break:break-all}

/* ===== Share Guide Overlay ===== */
.share-guide-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.75);z-index:9998;
  display:flex;align-items:flex-start;justify-content:flex-end;
}
.share-guide-content{
  margin:12px 20px 0 0;text-align:right;color:#fff;
}
.share-guide-arrow{font-size:48px;line-height:1}
.share-guide-text{font-size:16px;font-weight:600;margin-top:-8px;margin-right:10px}
.share-guide-sub{font-size:13px;opacity:0.8;margin-right:10px;margin-top:4px}

/* ===== Form ===== */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:14px;font-weight:500;margin-bottom:6px}
.fg input,.fg textarea{
  width:100%;padding:10px 14px;font-size:15px;font-family:var(--font);
  border:1px solid var(--border);border-radius:var(--r-btn);background:var(--card-bg);
  color:var(--t1);outline:none;transition:border-color .2s
}
.fg input:focus,.fg textarea:focus{border-color:var(--theme)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.5}
.fg .count{text-align:right;font-size:12px;color:var(--t3);margin-top:4px}

.theme-row{display:flex;gap:10px}
.t-dot{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;outline:none;transition:transform .15s}
.t-dot:active{transform:scale(.92)}
.t-dot.on{border-color:var(--t1);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--t1)}
.t-green{background:#07C160}.t-blue{background:#1989FA}.t-orange{background:#FF976A}.t-red{background:#EE0A24}

/* ===== WeChat Card ===== */
.wx-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin:16px 0}
.wx-card.clickable{cursor:pointer;transition:transform .15s}
.wx-card.clickable:active{transform:scale(.98)}
.card-img{width:100%;height:200px;background:linear-gradient(135deg,#F0F0F0,#E8E8E8);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card-img img.hidden,.card-ph.hidden{display:none}
.card-ph{font-size:48px;opacity:.35;z-index:1}
.card-body{padding:14px 16px 12px}
.card-body .ct{font-size:17px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-body .cd{font-size:14px;color:var(--t2);margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.card-foot .cf-text{font-size:13px;color:var(--link)}
.card-foot .cf-arrow{color:#C7C7CC;font-size:14px}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px 20px;font-size:16px;font-weight:500;font-family:var(--font);border:none;border-radius:var(--r-btn);cursor:pointer;outline:none;transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--theme);color:#fff}
.btn-p:hover{background:var(--theme-d)}
.btn-p:disabled{opacity:.5;transform:none}
.btn-o{background:var(--card-bg);color:var(--theme);border:1px solid var(--theme)}
.btn-s{background:var(--card-bg);color:var(--t1);border:1px solid var(--border)}
.btns{display:flex;gap:10px;margin-top:8px}
.btns .btn{flex:1}

/* ===== Location Result ===== */
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(153,153,153,.3);border-top-color:#999;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.loc-result{background:#fff;border-radius:var(--radius);padding:16px;margin-top:16px;box-shadow:var(--shadow);text-align:left}
.loc-result .lh{font-size:15px;font-weight:600;margin-bottom:10px}
.loc-result .lr{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:14px}
.loc-result .li{font-size:16px;flex-shrink:0;margin-top:1px}
.loc-result .la{color:var(--t1);line-height:1.5}
.loc-result .lc{color:var(--t2);font-size:13px}
.loc-result .ls{font-size:12px;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:4px}
.loc-result .lm{margin-top:10px;border-radius:8px;overflow:hidden;background:#F0F0F0}
.loc-result .lm img{width:100%;height:auto;display:block}

.loading{text-align:center;padding:20px;color:var(--t2)}
.loading .spin{margin-right:8px}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) translateY(20px);background:rgba(0,0,0,.78);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;z-index:9999}
.toast.on{opacity:1;transform:translate(-50%,-50%) translateY(0)}

.hidden{display:none !important}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@media(min-width:720px){
  .container{max-width:720px}
  .editor-row{display:flex;gap:24px;align-items:flex-start}
  .editor-row .form-col{flex:1}
  .editor-row .preview-col{flex:1;position:sticky;top:20px}
  .preview-label{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:8px;display:block!important}
}
@media(max-width:719px){.preview-label{display:none!important}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CCC;border-radius:2px}
</style>
</head>
<body data-mode="editor" data-theme="green">

<div class="container">

  <div class="header">
    <div class="icon">💬</div>
    <h1>小卡片分享</h1>
    <p id="subtitle">创建卡片，分享到微信群</p>
  </div>

  <!-- ===== 微信环境检测 ===== -->
  <div class="wx-banner hidden" id="wx-banner">
    <div class="wx-check">✅ 已在微信中打开</div>
    <div class="wx-hint">编辑卡片后点击分享，即可分享到微信群</div>
  </div>
  <div class="not-wx-banner hidden" id="not-wx-banner">
    <p>⚠️ 请<strong>在微信中打开</strong>此页面，才能分享到微信群</p>
    <button class="btn btn-p" id="btn-copy-link" style="margin-bottom:8px">📋 复制链接，发到微信中打开</button>
    <p style="font-size:12px;color:var(--t3)">在微信中打开后，编辑卡片 → 点击右上角分享即可</p>
  </div>

  <!-- ===== 分享引导遮罩 ===== -->
  <div class="share-guide-overlay hidden" id="share-guide">
    <div class="share-guide-content">
      <div class="share-guide-arrow">↗️</div>
      <div class="share-guide-text">点击右上角</div>
      <div class="share-guide-sub">「发送给朋友」或「分享到朋友圈」</div>
    </div>
  </div>

  <!-- ============ EDITOR ============ -->
  <div class="panel active" id="panel-editor">
    <div class="editor-row">
      <div class="form-col">
        <form id="card-form" autocomplete="off">
          <div class="fg">
            <label for="tit">卡片标题 *</label>
            <input type="text" id="tit" maxlength="60" placeholder="比如：今晚聚餐，来不来？">
            <div class="count"><span id="tit-n">0</span>/60</div>
          </div>
          <div class="fg">
            <label for="desc">卡片描述</label>
            <textarea id="desc" maxlength="200" placeholder="告诉朋友们这个活动的内容..."></textarea>
            <div class="count"><span id="desc-n">0</span>/200</div>
          </div>
          <div class="fg">
            <label for="img-url">封面图片链接</label>
            <input type="text" id="img-url" placeholder="https://example.com/image.jpg（粘贴可访问的图片URL）">
          </div>
          <div class="fg">
            <label>主题颜色</label>
            <div class="theme-row" id="theme-row">
              <button type="button" class="t-dot t-green on" data-t="green"></button>
              <button type="button" class="t-dot t-blue" data-t="blue"></button>
              <button type="button" class="t-dot t-orange" data-t="orange"></button>
              <button type="button" class="t-dot t-red" data-t="red"></button>
            </div>
          </div>
          <button type="submit" class="btn btn-p" id="btn-share">📤 分享到微信群</button>
        </form>
      </div>
      <div class="preview-col">
        <p class="preview-label">📱 小卡片预览</p>
        <div class="wx-card">
          <div class="card-img">
            <img id="pv-img" src="" alt="" class="hidden">
            <div class="card-ph" id="pv-ph">🖼️</div>
          </div>
          <div class="card-body">
            <div class="ct" id="pv-tit">卡片标题</div>
            <div class="cd" id="pv-desc">卡片描述会显示在这里...</div>
          </div>
          <div class="card-foot">
            <span class="cf-text">查看详情</span>
            <span class="cf-arrow">›</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ VIEWER (接收者页面) ============ -->
  <div class="panel" id="panel-viewer">
    <p style="text-align:center;font-size:13px;color:var(--t3);margin-bottom:8px">📨 有人给你分享了一张卡片</p>
    <div class="wx-card clickable" id="card-view">
      <div class="card-img">
        <img id="vw-img" src="" alt="" class="hidden">
        <div class="card-ph" id="vw-ph">🖼️</div>
      </div>
      <div class="card-body">
        <div class="ct" id="vw-tit"></div>
        <div class="cd" id="vw-desc"></div>
      </div>
      <div class="card-foot">
        <span class="cf-text" id="vw-foot">点击卡片 · 授权共享位置</span>
        <span class="cf-arrow">›</span>
      </div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--t3);margin-top:8px" id="tap-hint">👆 点击上方卡片授权并共享你的位置</p>

    <div class="loading hidden" id="loc-load"><span class="spin"></span> 正在获取位置...</div>

    <div class="loc-result hidden" id="loc-result">
      <div class="lh">📍 我的位置</div>
      <div class="lr"><span class="li">🏠</span><span class="la" id="loc-addr"></span></div>
      <div class="lr"><span class="li">🌐</span><span class="lc" id="loc-coord"></span></div>
      <span class="ls" id="loc-src"></span>
      <div class="lm" id="loc-map"></div>
    </div>

    <div style="margin-top:24px;text-align:center">
      <button class="btn btn-o" id="btn-make">✏️ 我也要创建卡片</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ==================== WeChat 环境检测 ====================
const ua = navigator.userAgent;
const isWX = /MicroMessenger/i.test(ua);
// 有些情况 UA 检测不准，延迟二次确认
let wxConfirmed = isWX;

// 启动后 1 秒通过 WeixinJSBridge 二次确认微信环境
setTimeout(function(){
  if (!wxConfirmed && window.WeixinJSBridge) {
    wxConfirmed = true;
    updateEnvUI();
  }
}, 1000);

const App = {
  cardData: null,
  geoDone: false,
};
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const B = document.body;

function inWX(){ return wxConfirmed }

// ==================== Toast ====================
let _tt;
function toast(m,d){clearTimeout(_tt);const e=$('#toast');e.textContent=m;e.classList.add('on');_tt=setTimeout(()=>e.classList.remove('on'),d||2000)}

// ==================== Panel ====================
function showPanel(p){$$('.panel').forEach(e=>e.classList.remove('active'));p.classList.add('active');p.style.animation='none';p.offsetHeight;p.style.animation=''}

// ==================== Base64 ====================
function b64e(s){const b=new TextEncoder().encode(s);let r='';b.forEach(v=>r+=String.fromCharCode(v));return btoa(r).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function b64d(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';const bin=atob(s),b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return new TextDecoder().decode(b)}
function enc(d){return b64e(JSON.stringify(d))}
function dec(h){try{if(!h)return null;const d=JSON.parse(b64d(h));return(d.v===1&&d.t&&d.t.trim())?d:null}catch(e){return null}}

// ==================== Image ====================
function setImg(el,ph,src){
  if(!src){el.classList.add('hidden');ph.classList.remove('hidden');el.removeAttribute('src');return}
  let done=false;
  const ok=v=>{if(done)return;done=true;v?(el.classList.remove('hidden'),ph.classList.add('hidden')):(el.classList.add('hidden'),ph.classList.remove('hidden'))};
  el.onload=()=>ok(true);el.onerror=()=>ok(false);el.src=src;
  if(el.complete)setTimeout(()=>ok(el.naturalWidth>0),0);
}

// ==================== 环境 UI 更新 ====================
function updateEnvUI(){
  if(inWX()){
    $('#wx-banner').classList.remove('hidden');
    $('#not-wx-banner').classList.add('hidden');
  }else{
    $('#wx-banner').classList.add('hidden');
    $('#not-wx-banner').classList.remove('hidden');
  }
}

// ==================== WeChat 分享设置 ====================
function setupWXShare(data){
  var sd = {
    title: data.t,
    desc: data.d || data.t,
    link: location.href,
    img_url: data.i || '',
    imgUrl: data.i || '',
  };

  function bind(){
    if(!window.WeixinJSBridge) return;
    // 发送给朋友
    WeixinJSBridge.on('menu:share:appmessage', function(){
      WeixinJSBridge.invoke('sendAppMessage', {
        title: sd.title, desc: sd.desc, link: sd.link, img_url: sd.img_url
      }, function(){});
    });
    // 分享到朋友圈
    WeixinJSBridge.on('menu:share:timeline', function(){
      WeixinJSBridge.invoke('shareTimeline', {
        title: sd.title, desc: sd.desc, link: sd.link, img_url: sd.img_url
      }, function(){});
    });
    // 分享到QQ
    WeixinJSBridge.on('menu:share:qq', function(){
      WeixinJSBridge.invoke('shareQQ', {
        title: sd.title, desc: sd.desc, link: sd.link, img_url: sd.img_url
      }, function(){});
    });
    console.log('[WXShare] 分享数据已绑定:', sd.title);
  }

  if(window.WeixinJSBridge){
    bind();
  } else {
    document.addEventListener('WeixinJSBridgeReady', bind, false);
  }
}

// ==================== Mode Switching ====================
function go(mode,data){
  if(data)App.cardData=data;
  var th=(data&&data.th)||'green';
  B.setAttribute('data-theme',th);B.setAttribute('data-mode',mode);

  if(mode==='editor'){
    showPanel($('#panel-editor'));location.hash='';renderEditor();
  }else if(mode==='viewer'){
    showPanel($('#panel-viewer'));renderViewer();
  }
}

// ==================== Editor ====================
function renderEditor(){
  updateEnvUI();
  $('#share-guide').classList.add('hidden');

  var d=App.cardData||{t:'',d:'',i:'',th:'green'};
  $('#tit').value=d.t||''; $('#desc').value=d.d||''; $('#img-url').value=d.i||'';
  updateCounts(); pickTheme(d.th||'green'); refreshPreview();
}

function pickTheme(th){$$('.t-dot').forEach(function(b){b.classList.toggle('on',b.dataset.t===th)});B.setAttribute('data-theme',th)}
function updateCounts(){$('#tit-n').textContent=$('#tit').value.length;$('#desc-n').textContent=$('#desc').value.length}
function refreshPreview(){$('#pv-tit').textContent=$('#tit').value.trim()||'卡片标题';$('#pv-desc').textContent=$('#desc').value.trim()||'卡片描述会显示在这里...';setImg($('#pv-img'),$('#pv-ph'),$('#img-url').value.trim())}

// ===== Editor: 点击"分享到微信群" =====
$('#card-form').addEventListener('submit',function(e){
  e.preventDefault();
  var data={v:1,t:$('#tit').value.trim(),d:$('#desc').value.trim(),i:$('#img-url').value.trim(),th:B.getAttribute('data-theme')||'green'};
  if(!data.t){toast('⚠️ 请输入卡片标题');$('#tit').focus();return}

  App.cardData=data;
  var hash=enc(data);
  history.replaceState(null,'',location.origin+location.pathname+'#'+hash);

  if(inWX()){
    // ★ 微信内：设置 JSBridge 分享数据 → 弹引导箭头
    setupWXShare(data);
    $('#share-guide').classList.remove('hidden');
    $('#subtitle').textContent='点击右上角 ··· → 发送给朋友 / 分享到朋友圈';
    toast('👆 请点击右上角 ... 按钮');
  } else {
    // ★ 非微信：提醒用户复制链接到微信
    var url=location.origin+location.pathname+'#'+hash;
    copyText(url).then(function(){toast('✅ 链接已复制！发到微信打开即可分享')}).catch(function(){toast('⚠️ 请手动复制链接发到微信')});
    $('#subtitle').textContent='链接已复制，发到微信中打开，然后点右上角分享';
  }
});

var _deb;
$('#tit').addEventListener('input',function(){updateCounts();clearTimeout(_deb);_deb=setTimeout(refreshPreview,200)});
$('#desc').addEventListener('input',function(){updateCounts();clearTimeout(_deb);_deb=setTimeout(refreshPreview,200)});
$('#img-url').addEventListener('input',function(){clearTimeout(_deb);_deb=setTimeout(refreshPreview,200)});
$('#theme-row').addEventListener('click',function(e){var b=e.target.closest('.t-dot');if(!b)return;pickTheme(b.dataset.t);refreshPreview()});

// 点击遮罩关闭
$('#share-guide').addEventListener('click',function(){this.classList.add('hidden')});

// 复制链接按钮
$('#btn-copy-link').addEventListener('click',function(){
  copyText(location.href).then(function(){toast('✅ 已复制！发到微信中打开')}).catch(function(){toast('⚠️ 复制失败')});
});

function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(text);
  return new Promise(function(resolve,reject){
    var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');resolve()}catch(e){reject(e)}
    document.body.removeChild(ta);
  });
}

// ==================== Viewer ====================
function renderViewer(){
  var d=App.cardData;if(!d){go('editor');return}
  $('#vw-tit').textContent=d.t||'';$('#vw-desc').textContent=d.d||'';
  setImg($('#vw-img'),$('#vw-ph'),d.i||'');
  App.geoDone=false;
  $('#loc-result').classList.add('hidden');$('#loc-load').classList.add('hidden');
  $('#tap-hint').classList.remove('hidden');$('#vw-foot').textContent='点击卡片 · 授权共享位置';
}

// 点击卡片 → 获取位置
$('#card-view').addEventListener('click',function(){
  if(App.geoDone)return;App.geoDone=true;
  $('#tap-hint').classList.add('hidden');$('#vw-foot').textContent='正在获取位置...';
  $('#loc-load').classList.remove('hidden');$('#loc-result').classList.add('hidden');

  getLocation().then(function(r){
    $('#loc-load').classList.add('hidden');$('#vw-foot').textContent='位置已共享 ✓';
    showLoc(r);
  }).catch(function(err){
    $('#loc-load').classList.add('hidden');$('#vw-foot').textContent='点击卡片 · 授权共享位置';
    $('#tap-hint').classList.remove('hidden');toast('❌ '+(err.message||'获取位置失败'));App.geoDone=false;
  });
});

// ==================== Location ====================
function getLocation(){return gps().catch(ipCo).catch(ipCom)}

function gps(){
  return new Promise(function(resolve,reject){
    if(!navigator.geolocation)return reject(new Error('浏览器不支持GPS'));
    var t=setTimeout(function(){reject(new Error('GPS超时'))},10000);
    navigator.geolocation.getCurrentPosition(function(pos){
      clearTimeout(t);
      var lat=pos.coords.latitude,lon=pos.coords.longitude,acc=pos.coords.accuracy;
      revGeo(lat,lon).then(function(addr){resolve({lat:lat,lon:lon,addr:addr,src:'gps',acc:Math.round(acc)})});
    },function(){clearTimeout(t);reject(new Error('GPS未授权'))},{enableHighAccuracy:false,timeout:10000,maximumAge:60000});
  });
}

function ipCo(){
  var c=new AbortController();var t=setTimeout(function(){c.abort()},5000);
  return fetch('https://ipapi.co/json/',{signal:c.signal}).then(function(r){
    clearTimeout(t);if(!r.ok)throw new Error('fail');return r.json();
  }).then(function(d){if(d.error)throw new Error(d.reason);
    var addr=[d.city,d.region,d.country_name].filter(Boolean).join(', ');
    return{lat:d.latitude,lon:d.longitude,addr:addr||d.latitude+','+d.longitude,src:'ip',acc:null};
  }).catch(function(e){clearTimeout(t);throw e});
}

function ipCom(){
  return new Promise(function(resolve,reject){
    var cb='_ip_'+Date.now();
    var t=setTimeout(function(){delete window[cb];reject(new Error('IP定位超时'))},8000);
    window[cb]=function(d){clearTimeout(t);delete window[cb];
      if(d&&d.lat!==undefined){var addr=[d.city,d.regionName,d.country].filter(Boolean).join(', ');resolve({lat:d.lat,lon:d.lon,addr:addr||d.lat+','+d.lon,src:'ip',acc:null})}
      else reject(new Error('无数据'));};
    var s=document.createElement('script');s.src='http://ip-api.com/json/?callback='+cb+'&fields=lat,lon,city,regionName,country';
    s.onerror=function(){clearTimeout(t);delete window[cb];reject(new Error('IP服务不可用'))};document.head.appendChild(s);
  });
}

var _gc={},_lg=0;
function revGeo(lat,lon){
  var k=lat.toFixed(3)+','+lon.toFixed(3);if(_gc[k])return Promise.resolve(_gc[k]);
  var w=Math.max(0,1100-(Date.now()-_lg));var p=w?new Promise(function(r){setTimeout(r,w)}):Promise.resolve();_lg=Date.now();
  return p.then(function(){
    return fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&zoom=18&addressdetails=1&accept-language='+(navigator.language||'zh-CN'),{headers:{'User-Agent':'WXCard/1.0'}});
  }).then(function(r){if(!r.ok)throw new Error('fail');return r.json()}).then(function(d){
    _gc[k]=d.display_name||lat.toFixed(4)+', '+lon.toFixed(4);return _gc[k];
  }).catch(function(){return lat.toFixed(4)+', '+lon.toFixed(4)});
}

function showLoc(r){
  var res=$('#loc-result');res.classList.remove('hidden');
  $('#loc-addr').textContent=r.addr||r.lat+','+r.lon;
  var t=r.lat.toFixed(6)+', '+r.lon.toFixed(6);if(r.acc)t+=' (±'+r.acc+'m)';$('#loc-coord').textContent=t;
  if(r.src==='gps'){$('#loc-src').textContent='📡 GPS定位 · 高精度';$('#loc-src').style.cssText='background:#E8F5E9;color:#2E7D32'}
  else{$('#loc-src').textContent='🌐 IP定位 · 近似位置';$('#loc-src').style.cssText='background:#FFF3E0;color:#E65100'}
  $('#loc-map').innerHTML='<img src="https://staticmap.openstreetmap.de/staticmap.php?center='+r.lat+','+r.lon+'&zoom=14&size=400x200&markers='+r.lat+','+r.lon+',red-pushpin" alt="地图" loading="lazy" onerror="this.parentElement.innerHTML=\'<div style=padding:40px;text-align:center;color:#999>地图不可用</div>\'">';
}

// ==================== Boot ====================
$('#btn-make').addEventListener('click',function(){App.cardData=null;go('editor')});
window.addEventListener('hashchange',function(){var d=dec(location.hash.slice(1));go(d?'viewer':'editor',d||undefined)});

function boot(){
  var data=dec(location.hash.slice(1));
  if(data){
    go('viewer',data);
    if(isWX) setupWXShare(data);
  }else{
    go('editor');
  }
}
document.addEventListener('DOMContentLoaded',boot);

})();
</script>
</body>
</html>
