<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生成分享卡片</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .image-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f8f9fa;
            margin-top: 8px;
            position: relative;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        .image-preview .placeholder {
            color: #999;
            font-size: 14px;
            text-align: center;
        }
        
        .image-preview .placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 8px;
            opacity: 0.3;
        }
        
        .image-preview.has-image img {
            display: block;
        }
        
        .image-preview.has-image .placeholder {
            display: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            font-size: 14px;
            text-align: center;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s;
        }
        
        .status-bar.show {
            transform: translateY(0);
        }
        
        .status-bar.success {
            background: #52c41a;
            color: white;
        }
        
        .status-bar.error {
            background: #ff4d4f;
            color: white;
        }
        
        .status-bar.info {
            background: #1890ff;
            color: white;
        }
        
        .guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            display: none;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 20px;
        }
        
        .guide-overlay.show {
            display: flex;
        }
        
        .guide-content {
            color: white;
            text-align: right;
            margin-top: 10px;
        }
        
        .guide-content img {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .guide-content p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .guide-content .highlight {
            color: #ffd700;
            font-weight: bold;
        }
        
        .card-preview {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: none;
        }
        
        .card-preview.show {
            display: block;
        }
        
        .card-preview .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .card-preview .card-body {
            padding: 16px;
        }
        
        .card-preview .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .card-preview .card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        
        .wechat-tips {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-size: 13px;
            color: #ad6800;
            line-height: 1.5;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="status-bar" id="statusBar"></div>
    
    <div class="guide-overlay" id="guideOverlay" onclick="hideGuide()">
        <div class="guide-content">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="margin-bottom:10px">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34L2.1 2.1m17.8 17.8l-4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.24-4.24l-4.24 4.24M6.34 6.34l-4.24-4.24"></path>
            </svg>
            <p>点击右上角 <span class="highlight">···</span></p>
            <p>选择 <span class="highlight">"发送给朋友"</span> 或 <span class="highlight">"分享到朋友圈"</span></p>
            <p>即可生成分享卡片</p>
            <p style="font-size:12px;opacity:0.7;margin-top:10px;">点击任意处关闭提示</p>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎯 分享卡片生成器</h1>
            <p>填写信息，生成微信分享卡片</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label for="title">标题 *</label>
                <input type="text" id="title" placeholder="请输入分享标题" maxlength="30">
            </div>
            
            <div class="form-group">
                <label for="desc">描述 *</label>
                <textarea id="desc" placeholder="请输入分享描述" maxlength="100"></textarea>
            </div>
            
            <div class="form-group">
                <label for="imgUrl">图片链接 *</label>
                <input type="url" id="imgUrl" placeholder="https://example.com/image.jpg" oninput="previewImage()">
                <div class="image-preview" id="imagePreview">
                    <div class="placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <div>输入图片链接后预览</div>
                    </div>
                    <img id="previewImg" src="" alt="预览" onload="onImageLoad()" onerror="onImageError()">
                </div>
            </div>
            
            <button class="btn-primary" id="shareBtn" onclick="initShare()">
                生成分享卡片
            </button>
            
            <div class="wechat-tips">
                <strong>💡 使用说明：</strong><br>
                1. 填写标题、描述和图片链接<br>
                2. 点击「生成分享卡片」按钮<br>
                3. 点击右上角「···」分享给好友<br>
                4. 好友将看到精美的分享卡片
            </div>
        </div>

        <div class="card-preview" id="cardPreview">
            <img class="card-image" id="cardImage" src="" alt="">
            <div class="card-body">
                <div class="card-title" id="cardTitle"></div>
                <div class="card-desc" id="cardDesc"></div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            signUrl: 'http://ms.gstai.com/phone/ajax_sign_vue.php',
            domain: 'https://fengxiang.zhyishun.top',
            jumpUrl: 'https://fengxiang.zhyishun.top/detail.html',
            appId: '' // 将从后端获取
        };

        let wxReady = false;
        let shareData = {
            title: '',
            desc: '',
            imgUrl: '',
            link: CONFIG.jumpUrl
        };

        // 显示状态提示
        function showStatus(message, type = 'info', duration = 3000) {
            const bar = document.getElementById('statusBar');
            bar.textContent = message;
            bar.className = 'status-bar ' + type + ' show';
            
            if (duration > 0) {
                setTimeout(() => {
                    bar.classList.remove('show');
                }, duration);
            }
        }

        // 预览图片
        function previewImage() {
            const url = document.getElementById('imgUrl').value.trim();
            const preview = document.getElementById('imagePreview');
            const img = document.getElementById('previewImg');
            
            if (url) {
                img.src = url;
            } else {
                preview.classList.remove('has-image');
            }
        }

        function onImageLoad() {
            document.getElementById('imagePreview').classList.add('has-image');
        }

        function onImageError() {
            document.getElementById('imagePreview').classList.remove('has-image');
            if (document.getElementById('imgUrl').value.trim()) {
                showStatus('图片加载失败，请检查链接', 'error');
            }
        }

        // 获取URL参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                title: params.get('title') || '',
                desc: params.get('desc') || '',
                imgUrl: params.get('imgUrl') || ''
            };
        }

        // 初始化页面
        function initPage() {
            const params = getUrlParams();
            if (params.title) document.getElementById('title').value = decodeURIComponent(params.title);
            if (params.desc) document.getElementById('desc').value = decodeURIComponent(params.desc);
            if (params.imgUrl) {
                document.getElementById('imgUrl').value = decodeURIComponent(params.imgUrl);
                previewImage();
            }
        }

        // 获取微信签名
        async function getWxSignature() {
            const currentUrl = window.location.href.split('#')[0];
            
            try {
                // 使用 JSONP 或 CORS 请求签名接口
                const response = await fetch(CONFIG.signUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'url=' + encodeURIComponent(currentUrl)
                });
                
                if (!response.ok) {
                    throw new Error('签名接口请求失败: ' + response.status);
                }
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('获取签名失败:', error);
                // 如果直接请求失败，尝试使用 JSONP 方式
                return await getWxSignatureJsonp(currentUrl);
            }
        }

        // JSONP 方式获取签名（备选）
        function getWxSignatureJsonp(url) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const callbackName = 'wxSignCallback_' + Date.now();
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.head.removeChild(script);
                    resolve(data);
                };
                
                script.onerror = function() {
                    delete window[callbackName];
                    document.head.removeChild(script);
                    reject(new Error('JSONP 请求失败'));
                };
                
                // 设置超时
                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        if (script.parentNode) document.head.removeChild(script);
                        reject(new Error('请求超时'));
                    }
                }, 10000);
                
                script.src = CONFIG.signUrl + 
                    '?url=' + encodeURIComponent(url) + 
                    '&callback=' + callbackName;
                document.head.appendChild(script);
            });
        }

        // 配置微信JS-SDK
        async function configWx() {
            try {
                showStatus('正在初始化微信配置...', 'info', 0);
                
                const signData = await getWxSignature();
                console.log('签名数据:', signData);
                
                if (!signData || signData.errcode !== 0) {
                    throw new Error(signData?.errmsg || '签名数据无效');
                }
                
                CONFIG.appId = signData.appId || signData.appid;
                
                wx.config({
                    debug: false,
                    appId: CONFIG.appId,
                    timestamp: signData.timestamp,
                    nonceStr: signData.nonceStr,
                    signature: signData.signature,
                    jsApiList: [
                        'updateAppMessageShareData',
                        'updateTimelineShareData',
                        'onMenuShareAppMessage',
                        'onMenuShareTimeline',
                        'onMenuShareQQ',
                        'onMenuShareQZone'
                    ]
                });
                
                return new Promise((resolve, reject) => {
                    wx.ready(() => {
                        wxReady = true;
                        showStatus('微信配置成功！', 'success');
                        resolve();
                    });
                    
                    wx.error((err) => {
                        console.error('微信配置失败:', err);
                        showStatus('微信配置失败: ' + JSON.stringify(err), 'error');
                        reject(err);
                    });
                });
                
            } catch (error) {
                showStatus('初始化失败: ' + error.message, 'error');
                throw error;
            }
        }

        // 设置分享内容
        function setShareData() {
            const title = document.getElementById('title').value.trim();
            const desc = document.getElementById('desc').value.trim();
            const imgUrl = document.getElementById('imgUrl').value.trim();
            
            if (!title || !desc || !imgUrl) {
                showStatus('请填写完整信息', 'error');
                return false;
            }
            
            shareData = {
                title: title,
                desc: desc,
                imgUrl: imgUrl,
                link: CONFIG.jumpUrl
            };
            
            // 更新预览
            document.getElementById('cardImage').src = imgUrl;
            document.getElementById('cardTitle').textContent = title;
            document.getElementById('cardDesc').textContent = desc;
            document.getElementById('cardPreview').classList.add('show');
            
            return true;
        }

        // 注册分享事件
        function registerShare() {
            // 分享给朋友
            wx.onMenuShareAppMessage({
                title: shareData.title,
                desc: shareData.desc,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    showStatus('分享成功！', 'success');
                    hideGuide();
                },
                cancel: function() {
                    showStatus('已取消分享', 'info');
                }
            });
            
            // 分享到朋友圈
            wx.onMenuShareTimeline({
                title: shareData.title,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    showStatus('分享成功！', 'success');
                    hideGuide();
                },
                cancel: function() {
                    showStatus('已取消分享', 'info');
                }
            });
            
            // 新版 API（1.4.0+）
            wx.updateAppMessageShareData({
                title: shareData.title,
                desc: shareData.desc,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    console.log('updateAppMessageShareData 成功');
                }
            });
            
            wx.updateTimelineShareData({
                title: shareData.title,
                link: shareData.link,
                imgUrl: shareData.imgUrl,
                success: function() {
                    console.log('updateTimelineShareData 成功');
                }
            });
        }

        // 初始化分享
        async function initShare() {
            if (!setShareData()) return;
            
            const btn = document.getElementById('shareBtn');
            btn.innerHTML = '<span class="loading"></span> 配置中...';
            btn.disabled = true;
            
            try {
                if (!wxReady) {
                    await configWx();
                }
                
                registerShare();
                showGuide();
                
            } catch (error) {
                console.error(error);
            } finally {
                btn.innerHTML = '生成分享卡片';
                btn.disabled = false;
            }
        }

        // 显示引导
        function showGuide() {
            document.getElementById('guideOverlay').classList.add('show');
        }

        // 隐藏引导
        function hideGuide() {
            document.getElementById('guideOverlay').classList.remove('show');
        }

        // 检测是否在微信内
        function isWechat() {
            return /MicroMessenger/i.test(navigator.userAgent);
        }

        // 页面加载完成后初始化
        window.onload = function() {
            initPage();
            
            if (!isWechat()) {
                showStatus('请在微信中打开此页面以获得最佳体验', 'info', 5000);
            }
            
            // 如果URL带有参数，自动初始化
            const params = getUrlParams();
            if (params.title && params.desc && params.imgUrl) {
                setTimeout(() => initShare(), 500);
            }
        };

        // 监听输入变化，实时更新预览
        ['title', 'desc', 'imgUrl'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (document.getElementById('title').value && 
                    document.getElementById('desc').value && 
                    document.getElementById('imgUrl').value) {
                    setShareData();
                }
            });
        });
    </script>
</body>
</html>
